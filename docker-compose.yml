version: '3.8'

services:
  api:
    build:
      context: ./api
    container_name: pulama-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./db:/app/db
    restart: unless-stopped

  web:
    build:
      context: ./web/pulama-farm
      dockerfile: Dockerfile.web
    container_name: pulama-web
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: pulama-nginx-proxy
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db:
